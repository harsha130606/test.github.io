<!DOCTYPE html>
<html>
<head>
<title>Login & Signup</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to right,#1e90ff,#00bfff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:800px;
  background:white;
  border-radius:10px;
  display:flex;
  overflow:hidden;
}

.form-box{
  width:50%;
  padding:40px;
  transition:0.5s;
}

h2{
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:#1e90ff;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#007acc;
}

.toggle{
  text-align:center;
  margin-top:10px;
  cursor:pointer;
  color:blue;
}
</style>
</head>

<body>

<div class="container">
  
  <div class="form-box" id="loginBox">
    <h2>Login</h2>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>
    <button>Login</button>
    <p class="toggle" onclick="showSignup()">Don't have account? Signup</p>
  </div>

  <div class="form-box" id="signupBox">
    <h2>Signup</h2>
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Create Password" required>
    <input type="password" placeholder="Confirm Password" required>
    <button>Signup</button>
    <p class="toggle" onclick="showLogin()">Already have account? Login</p>
  </div>

</div>

<script>
function showSignup(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("signupBox").style.display="block";
}

function showLogin(){
  document.getElementById("signupBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

window.onload=function(){
  document.getElementById("signupBox").style.display="none";
}
</script>

</body>
</html>
